# Scheduled job: fetch latest releases for supported components and update
# version constants in asl3_mapp.rb, then commit and push to main.
name: Update component versions

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Update version constants
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/update_versions.rb

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asl3_mapp.rb
          if git diff --staged --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: bump component versions (automated)"
            git push
          fi
